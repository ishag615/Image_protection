<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrivacyGuard — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f766e 0%, #0d5c55 50%, #0a3d38 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      font-size: 14px; padding: 20px;
    }

    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0,0,0,.25);
      width: min(420px, 100%); overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      padding: 32px 32px 28px; text-align: center; color: #fff;
    }
    .logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 8px; }
    .logo-text { font-size: 24px; font-weight: 800; letter-spacing: -.4px; }
    .tagline { font-size: 13px; opacity: .85; }

    .card-body { padding: 28px 32px 32px; }

    /* Tab switcher */
    .tab-bar {
      display: flex; background: #f1f5f9; border-radius: 8px;
      padding: 3px; margin-bottom: 24px;
    }
    .tab-btn {
      flex: 1; padding: 8px 0; border: none; background: transparent;
      border-radius: 6px; font-size: 13px; font-weight: 700; color: #64748b;
      cursor: pointer; transition: background .15s, color .15s;
    }
    .tab-btn.active { background: #fff; color: #0f766e; box-shadow: 0 1px 4px rgba(0,0,0,.1); }

    /* Form */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 6px; letter-spacing: .3px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 14px; font-family: inherit;
      outline: none; transition: border-color .15s, box-shadow .15s;
      background: #fafafa; color: #0f172a;
    }
    input:focus { border-color: #0f766e; box-shadow: 0 0 0 3px rgba(15,118,110,.12); background: #fff; }

    .submit-btn {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      color: #fff; font-size: 15px; font-weight: 800; cursor: pointer;
      margin-top: 8px; letter-spacing: .2px;
      transition: opacity .15s, transform .1s;
    }
    .submit-btn:hover { opacity: .93; }
    .submit-btn:active { transform: scale(.98); }
    .submit-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* Messages */
    .msg {
      padding: 11px 14px; border-radius: 8px; font-size: 13px;
      font-weight: 600; margin-bottom: 16px; display: none;
    }
    .msg.error { background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; }
    .msg.success { background: #f0fdf4; color: #16a34a; border: 1px solid #86efac; }
    .msg.visible { display: block; }

    .guest-link {
      text-align: center; margin-top: 20px; font-size: 13px; color: #64748b;
    }
    .guest-link a {
      color: #0f766e; font-weight: 700; text-decoration: none;
    }
    .guest-link a:hover { text-decoration: underline; }

    .form-panel { display: none; }
    .form-panel.active { display: block; }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="logo">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <span class="logo-text">PrivacyGuard</span>
    </div>
    <p class="tagline">Data regulation intelligence — scan, classify, and safeguard sensitive documents.</p>
  </div>

  <div class="card-body">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
    </div>

    <div id="msgBox" class="msg"></div>

    <!-- Login form -->
    <div id="loginPanel" class="form-panel active">
      <div class="form-group">
        <label for="loginUsername">Username</label>
        <input type="text" id="loginUsername" placeholder="Enter your username" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button class="submit-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    </div>

    <!-- Register form -->
    <div id="registerPanel" class="form-panel">
      <div class="form-group">
        <label for="regUsername">Username</label>
        <input type="text" id="regUsername" placeholder="Choose a username (min 3 characters)" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" placeholder="Choose a password (min 6 characters)" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="regConfirm">Confirm Password</label>
        <input type="password" id="regConfirm" placeholder="Re-enter your password" autocomplete="new-password">
      </div>
      <button class="submit-btn" id="registerBtn" onclick="doRegister()">Create Account</button>
    </div>

    <div class="guest-link">
      <a href="/">Continue as guest</a> — uploads are not saved after session ends
    </div>
  </div>
</div>

<script>
function switchTab(tab) {
  document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
  document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === (tab === 'login' ? 0 : 1)));
  clearMsg();
}

function showMsg(text, type) {
  const el = document.getElementById('msgBox');
  el.textContent = text;
  el.className = `msg ${type} visible`;
}
function clearMsg() {
  const el = document.getElementById('msgBox');
  el.className = 'msg';
}

async function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!username || !password) { showMsg('Please enter your username and password.', 'error'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  clearMsg();

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Login failed');
    showMsg(`Welcome back, ${data.username}! Redirecting…`, 'success');
    setTimeout(() => window.location.href = '/', 800);
  } catch (err) {
    showMsg(err.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

async function doRegister() {
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value;
  const confirm = document.getElementById('regConfirm').value;
  if (!username || !password) { showMsg('Please fill in all fields.', 'error'); return; }
  if (password !== confirm) { showMsg('Passwords do not match.', 'error'); return; }

  const btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.textContent = 'Creating account…';
  clearMsg();

  try {
    const r = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Registration failed');
    showMsg(`Account created! Welcome, ${data.username}! Redirecting…`, 'success');
    setTimeout(() => window.location.href = '/', 800);
  } catch (err) {
    showMsg(err.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}

// Allow Enter key submission
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const loginActive = document.getElementById('loginPanel').classList.contains('active');
  if (loginActive) doLogin(); else doRegister();
});
</script>
</body>
</html>
