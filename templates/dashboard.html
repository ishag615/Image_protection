<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrivacyGuard — Data Regulation Intelligence</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #0f766e;
      --primary-light: #14b8a6;
      --primary-dark: #0d5c55;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --warning: #d97706;
      --success: #16a34a;
      --success-bg: #f0fdf4;
      --critical: #9a3412;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
      --shadow: 0 4px 16px rgba(0,0,0,.1);
      --radius: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh; background: var(--bg); color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      font-size: 14px; line-height: 1.5;
    }

    .app { width: min(1340px, calc(100% - 32px)); margin: 0 auto; padding: 20px 0 56px; }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; margin-bottom: 20px;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    h1 { font-size: 24px; font-weight: 800; letter-spacing: -.4px; }
    .subtitle { color: var(--muted); font-size: 12px; margin-top: 1px; }

    .auth-bar { display: flex; align-items: center; gap: 10px; }
    .user-chip {
      display: flex; align-items: center; gap: 7px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 99px; padding: 6px 14px 6px 10px;
      font-size: 13px; font-weight: 700; box-shadow: var(--shadow-sm);
    }
    .user-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800;
    }

    /* ── Stats ───────────────────────────────────────────────────────────── */
    .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 20px; }
    .stat-card {
      background: var(--panel); border: 1px solid var(--border);
      border-top: 3px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow-sm);
    }
    .stat-card.c-blue   { border-top-color: #3b82f6; }
    .stat-card.c-orange { border-top-color: var(--warning); }
    .stat-card.c-red    { border-top-color: var(--danger); }
    .stat-card.c-purple { border-top-color: #7c3aed; }
    .stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: .6px; }
    .stat-value { font-size: 30px; font-weight: 800; margin-top: 4px; }

    /* ── Workspace ───────────────────────────────────────────────────────── */
    .workspace { display: grid; grid-template-columns: 380px 1fr; gap: 18px; align-items: start; }
    .panel {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden;
    }
    .panel-header {
      padding: 13px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-header h2 { font-size: 14px; font-weight: 700; }
    .panel-body { padding: 16px 18px; }

    /* ── Upload zone ─────────────────────────────────────────────────────── */
    .upload-zone {
      border: 2px dashed #b6cfd6; border-radius: 8px; min-height: 150px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; cursor: pointer; padding: 28px 20px;
      background: #f8fbfc; transition: border-color .15s, background .15s; gap: 10px;
    }
    .upload-zone:hover, .upload-zone.dragover { border-color: var(--primary); background: #edf8f8; }
    .upload-zone input { display: none; }
    .upload-icon { color: var(--primary); opacity: .7; }
    .upload-title { font-size: 14px; font-weight: 700; }
    .upload-hint { color: var(--muted); font-size: 12px; }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    button {
      display: inline-flex; align-items: center; gap: 6px; border: 0;
      border-radius: 6px; padding: 7px 13px; background: var(--primary);
      color: white; cursor: pointer; font-weight: 700; font-size: 12px;
      transition: background .12s; line-height: 1; white-space: nowrap;
    }
    button:hover { background: var(--primary-dark); }
    button.secondary { background: #e2e8f0; color: var(--text); }
    button.secondary:hover { background: #cbd5e1; }
    button.danger-btn { background: var(--danger-bg); color: var(--danger); }
    button.danger-btn:hover { background: #fecaca; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

    /* ── Status messages ─────────────────────────────────────────────────── */
    .status-msg {
      padding: 11px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: #f8fbfc; margin-top: 14px; font-size: 13px;
    }
    .status-msg.error { border-color: #fca5a5; background: var(--danger-bg); color: var(--danger); }
    .status-msg.scanning { border-color: #99f6e4; background: #f0fdfa; }

    /* ── Risk badges ─────────────────────────────────────────────────────── */
    .risk {
      display: inline-flex; align-items: center; padding: 2px 9px;
      border-radius: 999px; font-size: 11px; font-weight: 800;
      letter-spacing: .4px; text-transform: uppercase; white-space: nowrap;
    }
    .risk-low    { background: #dcfce7; color: #15803d; }
    .risk-medium { background: #fef3c7; color: #92400e; }
    .risk-high   { background: #fee2e2; color: var(--danger); }
    .risk-critical { background: #fde8d8; color: var(--critical); }

    /* ── Entity chips ────────────────────────────────────────────────────── */
    .entity-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .entity-chip {
      display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px;
      border-radius: 999px; font-size: 11px; font-weight: 600;
      background: #e0f2fe; color: #0369a1;
    }
    .entity-chip.high     { background: #fee2e2; color: var(--danger); }
    .entity-chip.critical { background: #fde8d8; color: var(--critical); }
    .entity-chip.medium   { background: #fef3c7; color: #92400e; }

    /* ── Scan result ─────────────────────────────────────────────────────── */
    .scan-result { margin-top: 14px; }
    .result-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 10px; margin-bottom: 10px;
    }
    .result-title { font-size: 14px; font-weight: 700; }
    .result-meta { color: var(--muted); font-size: 12px; margin-top: 2px; }

    .preview-toggle-wrap { margin-bottom: 12px; }
    .preview-toggle-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .preview-label-sm { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
    .toggle-btn-group { display: flex; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
    .toggle-btn {
      padding: 4px 12px; font-size: 11px; font-weight: 700; background: #f1f5f9;
      color: var(--muted); border: 0; border-radius: 0; cursor: pointer;
    }
    .toggle-btn.active { background: var(--primary); color: #fff; }
    .toggle-btn:hover:not(.active) { background: #e2e8f0; }
    .preview-img {
      width: 100%; border-radius: 6px; border: 1px solid var(--border);
      object-fit: contain; max-height: 180px; background: #f8f8f8;
    }
    .preview-placeholder {
      width: 100%; height: 100px; border-radius: 6px; border: 1px solid var(--border);
      background: #f1f5f9; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 6px; color: var(--muted); font-size: 12px;
    }

    /* ── History table ───────────────────────────────────────────────────── */
    .history-toolbar {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      background: #fafafa;
    }
    .history-toolbar .left { display: flex; align-items: center; gap: 8px; }
    .select-all-label { font-size: 12px; font-weight: 600; color: var(--muted); display: flex; align-items: center; gap: 6px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 10px 13px; border-bottom: 1px solid var(--border);
      text-align: left; vertical-align: middle; font-size: 13px;
    }
    th {
      color: var(--muted); background: #f8fafc; font-size: 10px;
      font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
    }
    tr:last-child td { border-bottom: 0; }
    tr:hover td { background: #fafcfe; }
    .file-name { font-weight: 700; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-type { color: var(--muted); font-size: 10px; text-transform: uppercase; margin-top: 1px; }
    .type-tags { display: flex; flex-wrap: wrap; gap: 3px; }
    .type-tag {
      padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600;
      background: #e0f2fe; color: #0369a1;
    }
    .type-tag.high     { background: #fee2e2; color: var(--danger); }
    .type-tag.critical { background: #fde8d8; color: var(--critical); }
    .table-actions { display: flex; gap: 5px; }
    .empty { padding: 48px 20px; color: var(--muted); text-align: center; font-size: 13px; }
    .guest-history {
      padding: 48px 24px; text-align: center;
    }
    .guest-history .gicon { font-size: 36px; margin-bottom: 12px; }
    .guest-history h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .guest-history p { color: var(--muted); font-size: 13px; margin-bottom: 16px; line-height: 1.6; }
    input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--primary); }

    /* ── Modal ───────────────────────────────────────────────────────────── */
    .modal {
      position: fixed; inset: 0; z-index: 100; display: flex;
      align-items: flex-start; justify-content: center;
      padding: 32px 16px; overflow-y: auto;
    }
    .modal.hidden { display: none; }
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(15,23,42,.5);
      backdrop-filter: blur(3px);
    }
    .modal-box {
      position: relative; background: var(--panel); border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,.22); width: min(860px,100%);
      z-index: 1; overflow: hidden;
    }
    .modal-header {
      padding: 18px 22px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    }
    .modal-title { font-size: 17px; font-weight: 800; }
    .modal-subtitle { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .modal-close {
      background: #f1f5f9; color: var(--text); border-radius: 50%;
      width: 32px; height: 32px; padding: 0; font-size: 16px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: #e2e8f0; }
    .modal-body { padding: 0; }

    /* ── Report summary strip ────────────────────────────────────────────── */
    .report-summary {
      padding: 14px 22px; background: #f8fafc; border-bottom: 1px solid var(--border);
      display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    }
    .reg-badge {
      padding: 3px 9px; border-radius: 5px; font-size: 10px; font-weight: 700;
      background: #ede9fe; color: #5b21b6; letter-spacing: .3px;
    }
    .doc-type-badge {
      padding: 3px 9px; border-radius: 5px; font-size: 10px; font-weight: 700;
      background: #dbeafe; color: #1d4ed8;
    }

    /* ── Report body sections ────────────────────────────────────────────── */
    .report-section { padding: 18px 22px; border-bottom: 1px solid var(--border); }
    .report-section:last-child { border-bottom: 0; }
    .section-title {
      font-size: 11px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .6px; color: var(--muted); margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }

    /* ── Preview ─────────────────────────────────────────────────────────── */
    .modal-preview-img {
      width: 100%; max-height: 260px; object-fit: contain;
      border-radius: 8px; border: 1px solid var(--border); background: #f8f8f8;
    }

    /* ── Findings ────────────────────────────────────────────────────────── */
    .findings-list { display: flex; flex-direction: column; gap: 0; }
    .finding-row {
      display: grid;
      grid-template-columns: 3px 1fr auto auto auto;
      align-items: center; gap: 0;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    .finding-row:last-child { border-bottom: 0; }
    .finding-row:hover { background: #fafcfe; }
    .finding-stripe { height: 100%; min-height: 46px; border-radius: 2px 0 0 2px; }
    .fr-low      { background: #16a34a; }
    .fr-medium   { background: var(--warning); }
    .fr-high     { background: var(--danger); }
    .fr-critical { background: var(--critical); }
    .finding-info { padding: 10px 12px; }
    .finding-name { font-weight: 700; font-size: 13px; }
    .finding-sub  { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .finding-val  { padding: 10px 8px; }
    .finding-risk { padding: 10px 8px; }
    .finding-action { padding: 10px 12px 10px 4px; }

    .detected-val {
      display: inline-block; font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px; padding: 2px 7px; background: #f1f5f9;
      border: 1px solid var(--border); border-radius: 4px; color: #334155;
      max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      vertical-align: middle;
    }

    /* ── Safeguard select ────────────────────────────────────────────────── */
    .safeguard-select {
      border: 1px solid var(--border); border-radius: 5px; padding: 4px 7px;
      font-size: 11px; background: white; cursor: pointer; min-width: 120px;
      font-family: inherit; color: var(--text);
    }
    .safeguard-select.risk-critical { border-color: var(--critical); }
    .safeguard-select.risk-high     { border-color: var(--danger); }

    /* ── Safeguard toolbar ───────────────────────────────────────────────── */
    .safeguard-toolbar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      background: #f8fafc; border-top: 1px solid var(--border);
      padding: 12px 22px;
    }
    .bulk-label { font-size: 12px; font-weight: 600; color: var(--muted); white-space: nowrap; }
    .apply-btn {
      padding: 10px 18px; font-size: 13px; border-radius: 7px;
      background: var(--primary); color: #fff;
    }
    .apply-btn:hover { background: var(--primary-dark); }
    .protect-status {
      padding: 10px 14px; border-radius: 7px; font-size: 13px; font-weight: 600;
      text-align: center; margin: 0 22px 14px;
    }
    .protect-status.success { background: var(--success-bg); color: var(--success); }
    .protect-status.error   { background: var(--danger-bg); color: var(--danger); }

    /* ── Risk gauge ──────────────────────────────────────────────────────── */
    .risk-gauge-track {
      height: 6px; border-radius: 999px; background: #e2e8f0; overflow: hidden; margin-top: 6px;
    }
    .risk-gauge-fill { height: 100%; border-radius: 999px; }
    .risk-gauge-fill.low      { background: #16a34a; }
    .risk-gauge-fill.medium   { background: var(--warning); }
    .risk-gauge-fill.high     { background: var(--danger); }
    .risk-gauge-fill.critical { background: var(--critical); }

    @media (max-width: 900px) {
      .workspace { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr; }
      header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<main class="app">

  <!-- Header -->
  <header>
    <div class="brand">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#0f766e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <div>
        <h1>PrivacyGuard</h1>
        <p class="subtitle">Intelligent data regulation — classify, assess, and safeguard sensitive information.</p>
      </div>
    </div>
    <div class="auth-bar" id="authBar">
      <!-- filled by initAuth() -->
    </div>
  </header>

  <!-- Stats -->
  <section class="stats">
    <div class="stat-card c-blue">
      <div class="stat-label">Documents Scanned</div>
      <div class="stat-value" id="total-docs">—</div>
    </div>
    <div class="stat-card c-orange">
      <div class="stat-label">Sensitive Items Found</div>
      <div class="stat-value" id="total-threats">—</div>
    </div>
    <div class="stat-card c-red">
      <div class="stat-label">High / Critical Risk</div>
      <div class="stat-value" id="high-risk-count">—</div>
    </div>
    <div class="stat-card c-purple">
      <div class="stat-label">Regulations Triggered</div>
      <div class="stat-value" id="regulation-count">—</div>
    </div>
  </section>

  <!-- Workspace -->
  <section class="workspace">

    <!-- Upload panel -->
    <div class="panel">
      <div class="panel-header"><h2>Scan Document</h2></div>
      <div class="panel-body">
        <label class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept="image/*,.pdf,.docx">
          <svg class="upload-icon" width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
          </svg>
          <span>
            <span class="upload-title">Drop a file or click to browse</span>
            <span class="upload-hint">Images, PDFs, Word docs — passport, ID, statement, anything</span>
          </span>
        </label>
        <div id="scanArea"></div>
      </div>
    </div>

    <!-- History panel -->
    <div class="panel">
      <div class="panel-header">
        <h2>Document History</h2>
        <button class="secondary" onclick="loadDocuments()" style="font-size:11px;padding:5px 10px">&#8635; Refresh</button>
      </div>
      <div id="historyContainer"><div class="empty">Loading…</div></div>
    </div>

  </section>
</main>

<!-- Modal -->
<div id="modal" class="modal hidden" onclick="handleModalClick(event)">
  <div class="modal-backdrop"></div>
  <div class="modal-box" id="modalBox">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle">Report</div>
        <div class="modal-subtitle" id="modalSubtitle"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let currentUser = null;  // {logged_in, username, user_id} or {logged_in: false}
let selectedDocs = new Set();

// ── Utilities ────────────────────────────────────────────────────────────────

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function riskBadge(level) {
  const l = (level || 'LOW').toLowerCase();
  return `<span class="risk risk-${l}">${(level||'LOW').toUpperCase()}</span>`;
}

function riskGaugeWidth(level) {
  return { LOW: '14%', MEDIUM: '46%', HIGH: '74%', CRITICAL: '100%' }[level] || '14%';
}

function formatDate(v) {
  if (!v) return '—';
  return new Date(v).toLocaleString(undefined, {
    month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit',
  });
}

function chipClass(r) {
  const l = (r||'').toLowerCase();
  if (l==='critical') return 'entity-chip critical';
  if (l==='high')     return 'entity-chip high';
  if (l==='medium')   return 'entity-chip medium';
  return 'entity-chip';
}

function typeTagClass(r) {
  const l = (r||'').toLowerCase();
  if (l==='critical') return 'type-tag critical';
  if (l==='high')     return 'type-tag high';
  return 'type-tag';
}

function fileTypeIcon(ft) {
  if (ft==='pdf')  return '📄';
  if (ft==='docx') return '📝';
  return '🖼️';
}

function defaultSafeguard(risk) {
  if (risk==='CRITICAL'||risk==='HIGH') return 'blur';
  if (risk==='MEDIUM') return 'redact';
  return 'keep';
}

function stripeClass(risk) {
  const l = (risk||'').toLowerCase();
  return `finding-stripe fr-${l||'low'}`;
}

// ── Auth ─────────────────────────────────────────────────────────────────────

async function initAuth() {
  try {
    const r = await fetch('/api/auth/me');
    currentUser = await r.json();
  } catch { currentUser = { logged_in: false }; }
  renderAuthBar();
  loadDocuments();
}

function renderAuthBar() {
  const bar = document.getElementById('authBar');
  if (currentUser && currentUser.logged_in) {
    const initials = (currentUser.username || '?').slice(0,2).toUpperCase();
    bar.innerHTML = `
      <div class="user-chip">
        <div class="user-avatar">${escHtml(initials)}</div>
        <span>${escHtml(currentUser.username)}</span>
      </div>
      <button class="secondary" onclick="doLogout()">Sign Out</button>`;
  } else {
    bar.innerHTML = `
      <span style="font-size:12px;color:var(--muted)">Guest session</span>
      <a href="/login" style="text-decoration:none">
        <button class="secondary">Sign In</button>
      </a>`;
  }
}

async function doLogout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.reload();
}

// ── Modal ─────────────────────────────────────────────────────────────────────

function openModal(title, subtitle, bodyHtml) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalSubtitle').textContent = subtitle;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  document.body.style.overflow = '';
}

function handleModalClick(e) {
  if (e.target===document.getElementById('modal')||e.target.classList.contains('modal-backdrop'))
    closeModal();
}

document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

// ── Document history ──────────────────────────────────────────────────────────

function loadDocuments() {
  fetch('/api/documents')
    .then(r => r.json())
    .then(docs => {
      const totalThreats = docs.reduce((s,d) => s+(d.threats_count||0), 0);
      const highRisk = docs.filter(d => ['HIGH','CRITICAL'].includes(d.risk_level)).length;
      const allRegs = new Set();
      docs.forEach(d => (d.regulations||[]).forEach(r => allRegs.add(r)));
      document.getElementById('total-docs').textContent = docs.length;
      document.getElementById('total-threats').textContent = totalThreats;
      document.getElementById('high-risk-count').textContent = highRisk;
      document.getElementById('regulation-count').textContent = allRegs.size;

      const container = document.getElementById('historyContainer');

      // Guests: show sign-in prompt
      if (!currentUser || !currentUser.logged_in) {
        if (!docs.length) {
          container.innerHTML = `
            <div class="guest-history">
              <div class="gicon">🔒</div>
              <h3>Sign in to save your history</h3>
              <p>As a guest, your uploads are only visible during this browser session.<br>
                 Create a free account to keep your scan history and access it anytime.</p>
              <a href="/login"><button>Sign In or Create Account</button></a>
            </div>`;
          return;
        }
        // Guest with current-session uploads — show them
        renderHistoryTable(docs, container, false);
        return;
      }

      if (!docs.length) {
        container.innerHTML = '<div class="empty">No documents yet. Upload a file to begin.</div>';
        return;
      }
      renderHistoryTable(docs, container, true);
    })
    .catch(err => {
      document.getElementById('historyContainer').innerHTML =
        `<div class="empty">Failed to load: ${escHtml(err.message)}</div>`;
    });
}

function renderHistoryTable(docs, container, showCheckboxes) {
  selectedDocs.clear();
  const rows = docs.map(doc => {
    const typeTags = (doc.document_types||[])
      .map(t => `<span class="${typeTagClass(t.risk_level)}">${escHtml(t.display_name||t.type)}</span>`)
      .join('');
    const cb = showCheckboxes
      ? `<td><input type="checkbox" value="${doc.id}" onchange="toggleSelect(this)"></td>`
      : '<td></td>';
    return `
      <tr>
        ${cb}
        <td>
          <div class="file-name" title="${escHtml(doc.filename)}">${fileTypeIcon(doc.file_type)} ${escHtml(doc.filename)}</div>
          <div class="file-type">${doc.file_type||''}</div>
        </td>
        <td style="color:var(--muted);font-size:11px;white-space:nowrap">${formatDate(doc.uploaded_at)}</td>
        <td><div class="type-tags">${typeTags||'<span style="color:var(--muted);font-size:11px">None</span>'}</div></td>
        <td>${riskBadge(doc.risk_level)}</td>
        <td>
          <div class="table-actions">
            <button onclick="showReport('${doc.id}')">Report</button>
            <button class="secondary" onclick="downloadFile('${doc.id}','protected')" title="Download Protected">&#8595;</button>
            <button class="danger-btn" onclick="deleteDocument('${doc.id}')" title="Delete">&#10005;</button>
          </div>
        </td>
      </tr>`;
  }).join('');

  const bulkBar = showCheckboxes ? `
    <div class="history-toolbar">
      <div class="left">
        <label class="select-all-label">
          <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"> Select all
        </label>
      </div>
      <button class="danger-btn" id="bulkDeleteBtn" onclick="bulkDelete()" style="display:none">
        &#10005; Delete Selected (<span id="selectedCount">0</span>)
      </button>
    </div>` : '';

  container.innerHTML = `
    ${bulkBar}
    <table>
      <thead>
        <tr>
          ${showCheckboxes ? '<th></th>' : '<th></th>'}
          <th>File</th><th>Scanned</th><th>Document Type(s)</th>
          <th>Risk</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function toggleSelect(checkbox) {
  if (checkbox.checked) selectedDocs.add(checkbox.value);
  else selectedDocs.delete(checkbox.value);
  updateBulkBar();
}

function toggleSelectAll(masterCb) {
  document.querySelectorAll('tbody input[type="checkbox"]').forEach(cb => {
    cb.checked = masterCb.checked;
    if (masterCb.checked) selectedDocs.add(cb.value);
    else selectedDocs.delete(cb.value);
  });
  updateBulkBar();
}

function updateBulkBar() {
  const btn = document.getElementById('bulkDeleteBtn');
  const cnt = document.getElementById('selectedCount');
  if (!btn) return;
  const n = selectedDocs.size;
  if (cnt) cnt.textContent = n;
  btn.style.display = n > 0 ? 'inline-flex' : 'none';
}

async function bulkDelete() {
  const ids = Array.from(selectedDocs);
  if (!ids.length) return;
  if (!confirm(`Delete ${ids.length} selected document(s)? This cannot be undone.`)) return;
  try {
    const r = await fetch('/api/documents/bulk-delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ doc_ids: ids }),
    });
    const data = await r.json();
    if (!data.success) throw new Error(data.error || 'Delete failed');
    selectedDocs.clear();
    loadDocuments();
  } catch (err) {
    alert(err.message);
  }
}

// ── Upload ────────────────────────────────────────────────────────────────────

function uploadFile(file) {
  const area = document.getElementById('scanArea');
  area.innerHTML = `
    <div class="status-msg scanning">
      <strong>Analyzing…</strong>
      <div style="color:var(--muted);font-size:12px;margin-top:3px">
        Running OCR, document classification, and PII detection.
      </div>
    </div>`;
  const form = new FormData();
  form.append('file', file);
  fetch('/api/upload', { method: 'POST', body: form })
    .then(r => r.json())
    .then(result => {
      if (!result.success) throw new Error(result.error || 'Upload failed');
      area.innerHTML = buildUploadResult(result);
      document.getElementById('fileInput').value = '';
      loadDocuments();
    })
    .catch(err => {
      area.innerHTML = `<div class="status-msg error"><strong>${escHtml(err.message)}</strong></div>`;
    });
}

function buildUploadResult(result) {
  const isImage = result.file_type === 'image';
  const docId = result.document_id;

  let previewHtml = '';
  if (isImage) {
    previewHtml = `
      <div class="preview-toggle-wrap">
        <div class="preview-toggle-bar">
          <span class="preview-label-sm">Preview</span>
          <div class="toggle-btn-group">
            <button class="toggle-btn active" onclick="switchPreview('${docId}','original',this)">Original</button>
            <button class="toggle-btn" onclick="switchPreview('${docId}','protected',this)">Protected</button>
          </div>
        </div>
        <img src="/api/preview/${docId}/original" class="preview-img" id="thumb-${docId}" alt="Preview">
      </div>`;
  } else {
    previewHtml = `
      <div class="preview-placeholder" style="margin-bottom:10px">
        <span style="font-size:28px">${fileTypeIcon(result.file_type)}</span>
        <span>Protected copy ready</span>
      </div>`;
  }

  const allChips = [
    ...(result.document_types||[]).map(t => ({label: t.display_name||t.type, risk: t.risk_level})),
    ...(result.entities||[]).filter(e => !e.doc_level).map(e => ({label: e.display_name||e.type, risk: e.risk_level}))
  ];
  const chips = allChips.length
    ? `<div class="entity-chips">${allChips.slice(0,10).map(t => `<span class="${chipClass(t.risk)}">${escHtml(t.label)}</span>`).join('')}</div>`
    : `<div style="color:var(--success);font-size:12px;margin-bottom:10px">✓ No sensitive data detected.</div>`;

  const regs = result.regulations||[];
  const regHtml = regs.length
    ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px">${regs.map(r=>`<span class="reg-badge">${escHtml(r)}</span>`).join('')}</div>`
    : '';

  return `
    <div class="scan-result">
      <div class="result-header">
        <div>
          <div class="result-title">${escHtml(result.filename)}</div>
          <div class="result-meta">${result.threats_detected||0} sensitive item(s) detected</div>
        </div>
        ${riskBadge(result.risk_level)}
      </div>
      ${chips}${regHtml}${previewHtml}
      <div class="btn-row">
        <button onclick="showReport('${docId}')">&#128196; Full Report</button>
        <button class="secondary" onclick="downloadFile('${docId}','protected')">&#8595; Protected</button>
        <button class="secondary" onclick="downloadFile('${docId}','original')">&#8595; Original</button>
      </div>
    </div>`;
}

// ── Before/After toggle ───────────────────────────────────────────────────────

function switchPreview(docId, version, btn) {
  const thumb = document.getElementById(`thumb-${docId}`);
  if (!thumb) return;
  thumb.src = `/api/preview/${docId}/${version}${version==='protected'?'?t='+Date.now():''}`;
  btn.closest('.toggle-btn-group')?.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Report modal ──────────────────────────────────────────────────────────────

function showReport(docId) {
  openModal('Loading…', '', '<div style="padding:24px;color:var(--muted)">Fetching report…</div>');
  fetch(`/api/report/${docId}`)
    .then(r => r.json())
    .then(result => {
      if (result.error) throw new Error(result.error);
      const isImage = result.file_type === 'image';
      document.getElementById('modalTitle').textContent = result.document || 'Vulnerability Report';
      document.getElementById('modalSubtitle').textContent =
        `Scanned ${formatDate(result.uploaded)} · ${result.entity_count||0} sensitive item(s)`;
      document.getElementById('modalBody').innerHTML = buildReportBody(result, docId, isImage);
    })
    .catch(err => {
      document.getElementById('modalBody').innerHTML =
        `<div style="padding:20px;color:var(--danger)">${escHtml(err.message)}</div>`;
    });
}

function buildReportBody(result, docId, isImage) {
  const rl = (result.risk_level||'LOW').toLowerCase();

  // ── Summary strip ──────────────────────────────────────────────────────────
  const docTypes = result.document_types || [];
  const regs = result.regulations || [];
  const summaryStrip = `
    <div class="report-summary">
      ${riskBadge(result.risk_level)}
      <div class="risk-gauge-track" style="width:80px;flex-shrink:0">
        <div class="risk-gauge-fill ${rl}" style="width:${riskGaugeWidth(result.risk_level)}"></div>
      </div>
      ${docTypes.map(t=>`<span class="doc-type-badge">${escHtml(t.display_name||t.type)}</span>`).join('')}
      ${regs.map(r=>`<span class="reg-badge">${escHtml(r)}</span>`).join('')}
    </div>`;

  // ── Preview ────────────────────────────────────────────────────────────────
  let previewSection = '';
  if (isImage) {
    previewSection = `
      <div class="report-section">
        <div class="section-title" style="justify-content:space-between">
          <span>Document Preview</span>
          <div class="toggle-btn-group">
            <button class="toggle-btn active" onclick="switchPreview('${docId}','original',this)">Original</button>
            <button class="toggle-btn" onclick="switchPreview('${docId}','protected',this)">Protected</button>
          </div>
        </div>
        <img src="/api/preview/${docId}/original" class="modal-preview-img" id="thumb-${docId}" alt="Preview">
      </div>`;
  }

  // ── Findings + safeguard controls (unified) ────────────────────────────────
  const allEntities = result.entities || [];

  let findingsSection = '';
  if (allEntities.length) {
    // Separate doc-level and field-level
    const docLevels  = allEntities.filter(e =>  e.doc_level);
    const fieldLevels = allEntities.filter(e => !e.doc_level);

    const renderRows = (items, label) => {
      if (!items.length) return '';
      const rows = items.map((entity, _idx) => {
        const realIdx = allEntities.indexOf(entity);
        const def = defaultSafeguard(entity.risk_level);
        const riskClass = entity.risk_level==='CRITICAL' ? 'risk-critical'
                        : entity.risk_level==='HIGH'     ? 'risk-high' : '';
        const icon = entity.doc_level ? '📄' : '🔍';
        const sub = entity.doc_level
          ? `Conf: ${Math.round((entity.confidence||0)*100)}%${(entity.evidence||[]).length ? ' · ' + entity.evidence.slice(0,2).join(', ') : ''}`
          : `${escHtml(entity.detection_method||'—')} · ${Math.round((entity.confidence||0)*100)}% conf`;
        return `
          <div class="finding-row">
            <div class="${stripeClass(entity.risk_level)}"></div>
            <div class="finding-info">
              <div class="finding-name">${icon} ${escHtml(entity.display_name||entity.type)}</div>
              <div class="finding-sub">${sub}</div>
            </div>
            <div class="finding-val">
              <span class="detected-val" title="${escHtml(entity.value||'')}">${escHtml(entity.value||'[masked]')}</span>
            </div>
            <div class="finding-risk">${riskBadge(entity.risk_level)}</div>
            <div class="finding-action">
              <select class="safeguard-select ${riskClass}" data-entity-idx="${realIdx}">
                <option value="blur"${def==='blur'?' selected':''}>Blur</option>
                <option value="redact"${def==='redact'?' selected':''}>Redact</option>
                <option value="pixelate"${def==='pixelate'?' selected':''}>Pixelate</option>
                <option value="keep"${def==='keep'?' selected':''}>Keep</option>
              </select>
            </div>
          </div>`;
      }).join('');
      return `
        <div style="padding:4px 22px 0">
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:10px 0 6px">${label}</div>
        </div>
        <div class="findings-list">${rows}</div>`;
    };

    findingsSection = `
      <div class="report-section" style="padding:0">
        <div style="padding:14px 22px 0"><div class="section-title">Findings &amp; Safeguard Configuration</div></div>
        ${renderRows(docLevels, 'Document Classification')}
        ${renderRows(fieldLevels, 'Sensitive Data Fields')}
      </div>
      <div class="safeguard-toolbar">
        <span class="bulk-label">Apply to all:</span>
        <select class="safeguard-select" id="bulkSafeguardSelect">
          <option value="blur">Blur</option>
          <option value="redact">Redact</option>
          <option value="pixelate">Pixelate</option>
          <option value="keep">Keep</option>
        </select>
        <button class="secondary" onclick="applyBulkSafeguard()" style="font-size:11px;padding:5px 10px">Apply to All</button>
        <button class="apply-btn" id="applySafeguardsBtn" onclick="applySafeguards('${docId}')">
          &#128274; Generate Protected Copy
        </button>
      </div>
      <div id="safeguardStatus"></div>`;
  } else {
    findingsSection = `
      <div class="report-section" style="color:var(--success);font-weight:600">
        ✓ No sensitive data detected in this document.
      </div>`;
  }

  // ── Download actions ───────────────────────────────────────────────────────
  const actionsSection = `
    <div class="report-section">
      <div class="btn-row" style="margin-top:0">
        <button onclick="downloadFile('${docId}','protected')">&#8595; Download Protected</button>
        <button class="secondary" onclick="downloadFile('${docId}','original')">&#8595; Download Original</button>
      </div>
    </div>`;

  return summaryStrip + previewSection + findingsSection + actionsSection;
}

// ── Safeguard actions ─────────────────────────────────────────────────────────

function applyBulkSafeguard() {
  const bulk = document.getElementById('bulkSafeguardSelect').value;
  document.querySelectorAll('.safeguard-select[data-entity-idx]').forEach(sel => { sel.value = bulk; });
}

async function applySafeguards(docId) {
  const btn = document.getElementById('applySafeguardsBtn');
  const statusEl = document.getElementById('safeguardStatus');
  btn.disabled = true; btn.textContent = 'Generating…';
  statusEl.innerHTML = '';

  const safeguards = {};
  document.querySelectorAll('.safeguard-select[data-entity-idx]').forEach(sel => {
    safeguards[sel.dataset.entityIdx] = sel.value;
  });

  try {
    const resp = await fetch(`/api/protect/${docId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ safeguards }),
    });
    const result = await resp.json();
    if (!result.success) throw new Error(result.error || 'Protection failed');

    const t = Date.now();
    const thumb = document.getElementById(`thumb-${docId}`);
    if (thumb) {
      thumb.src = `/api/preview/${docId}/protected?t=${t}`;
      thumb.closest('.report-section, .preview-toggle-wrap')
        ?.querySelectorAll('.toggle-btn').forEach((b,i) => b.classList.toggle('active', i===1));
    }

    statusEl.innerHTML = `
      <div class="protect-status success">
        ✓ Protected copy generated.
        <a href="/api/download/${docId}/protected" style="color:var(--primary);font-weight:700;margin-left:6px">Download</a>
      </div>`;
    loadDocuments();
  } catch (err) {
    statusEl.innerHTML = `<div class="protect-status error">&#10005; ${escHtml(err.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '&#128274; Generate Protected Copy';
  }
}

// ── Download / Delete ─────────────────────────────────────────────────────────

function downloadFile(docId, version) {
  fetch(`/api/download/${docId}/${version}`)
    .then(r => {
      if (!r.ok) return r.json().then(e => { throw new Error(e.error||'Download failed'); });
      return r.blob().then(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `${version}_${docId}`;
        document.body.appendChild(a); a.click();
        URL.revokeObjectURL(url); a.remove();
      });
    })
    .catch(err => alert(err.message));
}

function deleteDocument(docId) {
  if (!confirm('Delete this document and its files? This cannot be undone.')) return;
  fetch(`/api/delete/${docId}`, { method: 'DELETE' })
    .then(r => r.json())
    .then(result => {
      if (!result.success) throw new Error(result.error||'Delete failed');
      loadDocuments();
    })
    .catch(err => alert(err.message));
}

// ── File input ────────────────────────────────────────────────────────────────

const fileInput = document.getElementById('fileInput');
const uploadZone = document.getElementById('uploadZone');

fileInput.addEventListener('change', e => {
  const [file] = e.target.files;
  if (file) uploadFile(file);
});
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('dragover');
  const [file] = e.dataTransfer.files;
  if (file) uploadFile(file);
});

// ── Init ──────────────────────────────────────────────────────────────────────
initAuth();
</script>
</body>
</html>
